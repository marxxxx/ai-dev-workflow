name: CI

# Validation gate for pull requests. Mark the "test" job as a required
# status check in the branch protection rules for `main` so PRs cannot
# merge until the full test suite passes.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run full test suite
        run: npm test

      - name: Verify generation is deterministic
        # Generated files (.claude/.codex/.opencode) are gitignored, so a fresh
        # checkout has none — bare `check` would report drift and fail. Generate
        # first, then check: this proves the generator is idempotent (no
        # non-deterministic output) rather than diffing against committed files.
        run: |
          npm run generate
          npm run check
